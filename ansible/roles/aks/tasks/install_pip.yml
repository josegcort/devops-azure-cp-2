# Actualiza los repositorios APT antes de instalar python3-venv
- name: Actualizar repositorios APT
  apt:
    update_cache: true

# Instalar pip del sistema
- name: Instalar python3-pip
  ansible.builtin.apt:
    name:
      - python3-pip
      - python3-kubernetes
    state: present
    update_cache: true
  become: true