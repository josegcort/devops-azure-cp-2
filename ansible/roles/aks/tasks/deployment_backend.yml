# Tarea para crear el deployment sin PVC
- name: Crear deployment
  kubernetes.core.k8s:
    kubeconfig: "{{ aks_kubeconfig_path }}"
    state: present
    definition:
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: "{{ item.deploy }}"
        namespace: "{{ aks_namespace }}"
      spec:
        replicas: 1
        selector:
          matchLabels:
            app: "{{ item.app }}"
        template:
          metadata:
            labels:
              app: "{{ item.app }}"
          spec:
            imagePullSecrets:
              - name: "{{ aks_secret }}"
            containers:
              - name: "{{ item.app }}"
                image: "{{ acr_login_server }}/{{ item.name }}:{{ item.tag }}"
                ports:
                  - containerPort: "{{ item.port_in }}"