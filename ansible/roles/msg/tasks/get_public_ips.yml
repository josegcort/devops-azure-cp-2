# Obtener IP pública del servicio LoadBalancer para el backend
- name: Obtener IP pública del servicio
  kubernetes.core.k8s_info:
    kubeconfig: "{{ aks_kubeconfig_path }}"
    kind: Service
    name: "{{ image_backend[0].service }}"
    namespace: "{{ aks_namespace }}"
  register: svc_info
  retries: 10          # intenta 10 veces
  delay: 15            # espera 15 segundos entre intentos
  until: >
    svc_info.resources | length > 0 and
    svc_info.resources[0].status.loadBalancer.ingress is defined and
    svc_info.resources[0].status.loadBalancer.ingress | length > 0
    
# Mostrar IP pública del backend 
- name: Mostrar IP del servicio LoadBalancer para el backend
  debug:
    msg: "IP pública: {{ svc_info.resources[0].status.loadBalancer.ingress[0].ip }}:8060"

# Mostrar IP pública del nginx 
- name: Mostrar IP del contenedor nginx de la vm
  debug:
    msg: "IP pública:puerto: {{ vm_public_ip }}:{{ image_nginx[0].port_out }}"