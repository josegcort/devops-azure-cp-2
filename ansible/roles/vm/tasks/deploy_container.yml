# Descarga y ejecuta la imagen de nginx desde el ACR
- name: Descargar y ejecutar contenedor de Nginx desde ACR
  containers.podman.podman_container:
    name: web
    image: "{{ acr_login_server }}/{{ item.name }}:{{ item.tag }}"
    state: started
    recreate: yes
    pull: always
    ports:
    - "80:80"